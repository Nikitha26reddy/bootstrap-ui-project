<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.main-content {
  flex: 1;
}
</style>

</head>

<body>

<!-- NAVBAR (FIXED) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MySite</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="contact.html" class="nav-link active">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="main-content">

<div class="container my-5">
<h1 id="typing" class="text-center fw-bold mb-4"></h1>

<form class="col-md-6 mx-auto shadow-lg p-4 rounded bg-light">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" placeholder="Enter your name">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" placeholder="Enter your email">
</div>

<div class="mb-3">
<label>Message</label>
<textarea class="form-control" rows="4" placeholder="Enter your message"></textarea>
</div>

<button class="btn btn-primary w-100">Submit</button>

</form>

</div>

</div>

<!-- FOOTER (ADDED) -->
<footer class="bg-dark text-white text-center p-3">
  © 2026 MySite | Built with Bootstrap 5
</footer>

<!-- TYPING -->
<script>
window.onload = function () {
const text = "Contact Us";
let i = 0;
function type(){
if(i<text.length){
document.getElementById("typing").innerHTML += text.charAt(i);
i++;
setTimeout(type,60);
}
}
type();
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
