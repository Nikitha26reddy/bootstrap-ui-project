<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Home</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

<style>
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.main-content {
  flex: 1;
}

.hero {
  height: 60vh;
  background: linear-gradient(to right, #141e30, #243b55);
  color: white;
}

.card {
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-8px);
}

.btn:hover {
  transform: scale(1.05);
  transition: 0.2s;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MySite</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li><a href="index.html" class="nav-link active">Home</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="main-content">

<!-- HERO SECTION -->
<div class="hero d-flex align-items-center justify-content-center text-center">
  <div>
    <h1 id="typing" class="display-4 fw-bold"></h1>
    <p class="lead">Clean UI with Bootstrap 5</p>
    <a href="about.html" class="btn btn-warning btn-lg mt-3">Get Started</a>
  </div>
</div>

<!-- FEATURES -->
<div class="container my-5">
    <h2 class="text-center mb-4">Our Features</h2>
    <div class="row text-center">

        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <i class="bi bi-phone display-4 text-primary"></i>
                <h5 class="mt-3">Responsive</h5>
                <p>Works perfectly on all devices.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <i class="bi bi-speedometer display-4 text-success"></i>
                <h5 class="mt-3">Fast</h5>
                <p>Optimized performance.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <i class="bi bi-palette display-4 text-danger"></i>
                <h5 class="mt-3">Modern UI</h5>
                <p>Clean and attractive design.</p>
            </div>
        </div>

    </div>
</div>

<!-- CAROUSEL -->
<div id="carouselExample" class="carousel slide container mb-5" data-bs-ride="carousel">
  <div class="carousel-inner">

    <div class="carousel-item active text-center">
      <img src="images/img1.jpg" class="rounded" style="max-height:300px; width:auto;">
    </div>

    <div class="carousel-item text-center">
      <img src="images/img2.jpg" class="rounded" style="max-height:300px; width:auto;">
    </div>

    <div class="carousel-item text-center">
      <img src="images/img3.jpg" class="rounded" style="max-height:300px; width:auto;">
    </div>

  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
  © 2026 MySite | Built with Bootstrap 5
</footer>

<!-- TYPING EFFECT -->
<script>
window.onload = function () {
  const text = "Build Modern Websites";
  let i = 0;
  function type() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 60);
    }
  }
  type();
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
